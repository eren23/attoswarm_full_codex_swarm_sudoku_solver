  <main class="page" data-page="sudoku-app">

      <header class="page-header">
        <p class="eyebrow">Sudoku Solver</p>
        <h1 id="page-title">Solve a 9x9 puzzle in one pass</h1>
        <p class="page-copy">

      </header>

      <section class="status-panel" aria-label="Puzzle status">

        </p>
      </section>
